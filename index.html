<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hinata AI 💜</title>
<style>
*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
margin:0;
padding:0;
}
body{
background:#08080d;
color:white;
height:100vh;
overflow:hidden;
}
button{
background:#a855f7;
border:none;
color:white;
padding:12px 18px;
border-radius:14px;
cursor:pointer;
font-weight:600;
font-size:15px;
}
button:active{
transform:scale(0.97);
}
input{
background:#151520;
border:1px solid #333;
color:white;
padding:14px;
border-radius:14px;
width:100%;
outline:none;
font-size:15px;
}
.hidden{
display:none!important;
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.loginBox{
background:#11111b;
padding:30px;
border-radius:25px;
width:100%;
max-width:380px;
text-align:center;
border:1px solid #292938;
}
.logo{
width:100px;
height:100px;
object-fit:contain;
margin-bottom:10px;
}
h1{
color:#a855f7;
margin:10px 0;
}
.loginBox p{
color:#aaa;
margin-bottom:20px;
}

/* APP */
#app{
height:100vh;
display:flex;
flex-direction:column;
}
header{
height:65px;
background:#11111b;
display:flex;
align-items:center;
padding:10px 15px;
gap:12px;
border-bottom:1px solid #222;
}
header img{
width:45px;
height:45px;
border-radius:50%;
}
header span{
font-size:20px;
font-weight:bold;
color:#a855f7;
}
#adminBtn{
margin-left:auto;
display:none;
padding:8px 12px;
font-size:14px;
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
}
.message{
max-width:85%;
padding:13px 16px;
margin:10px 0;
border-radius:18px;
line-height:1.5;
word-wrap:break-word;
}
.user{
background:#a855f7;
margin-left:auto;
border-bottom-right-radius:4px;
}
.hinata{
background:#1d1d2a;
border-bottom-left-radius:4px;
}
.hinata b{
color:#a855f7;
}
.typing{
opacity:0.7;
font-style:italic;
}

/* FOOTER */
footer{
display:flex;
padding:10px;
gap:8px;
background:#11111b;
border-top:1px solid #222;
}
footer input{
margin:0;
flex:1;
}
.mic,.send{
width:50px;
padding:0;
font-size:20px;
}

/* ADMIN */
#adminPanel{
position:fixed;
right:-100%;
top:0;
height:100%;
width:85%;
max-width:400px;
background:#11111b;
z-index:20;
padding:20px;
overflow:auto;
transition:.3s;
border-left:1px solid #222;
}
#adminPanel.open{
right:0;
}
#adminPanel h2{
color:#a855f7;
margin-bottom:15px;
}
.chatData{
background:#1b1b28;
padding:12px;
border-radius:12px;
margin:10px 0;
font-size:14px;
border:1px solid #292938;
}
.chatData b{
color:#a855f7;
}
.chatData small{
color:#777;
font-size:12px;
}
</style>
</head>
<body>

<div id="loginPage">
<div class="loginBox">
<img src="logo.png" class="logo" onerror="this.style.display='none'">
<h1>Hinata AI 💜</h1>
<p>Your Smart Companion</p>
<input id="username" placeholder="Enter Your Name">
<br><br>
<button onclick="startUser()">Start Chat</button>
<br><br>
<button onclick="CEO()">CEO Login</button>
</div>
</div>

<div id="app" class="hidden">
<header>
<img src="logo.png" onerror="this.style.display='none'">
<span>Hinata AI 💜</span>
<button id="adminBtn" onclick="openAdmin()">Admin</button>
</header>
<div id="chat"></div>
<footer>
<input id="messageInput" placeholder="Talk with Hinata..." onkeypress="if(event.key==='Enter')send()">
<button class="mic" onclick="mic()">🎤</button>
<button class="send" onclick="send()">➤</button>
</footer>
</div>

<div id="adminPanel">
<h2>CEO Admin 💜</h2>
<button onclick="closeAdmin()">Close Panel</button>
<hr style="margin:15px 0;border:1px solid #222;">
<div id="allChats"></div>
</div>

<script>
const OPENAI_API_KEY = "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";
let userName="";
let CEO_MODE=false;
let chatHistory=[];
let isProcessing=false;

function startUser(){
let name=document.getElementById("username").value.trim();
if(!name){
alert("Name enter karo 💜");
return;
}
userName=name;
openApp();
}

function CEO(){
let pass=prompt("CEO Password");
if(pass==="@JASHBEER04"){
CEO_MODE=true;
userName="CEO Jashbeer";
document.getElementById("adminBtn").style.display="block";
openApp();
}else{
alert("Wrong Password ❌");
}
}

function openApp(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
addMessage("Hinata",`Hii ${userName} 🌷 Main Hinata hu 💜 Tumhari smart companion. Coding, science, life - kuch bhi pucho. Main hamesha sath hu ✨`,false);
loadOld();
}

function addMessage(sender,text,save=true){
let div=document.createElement("div");
div.className="message "+(sender==="You"?"user":"hinata");
div.innerHTML="<b>"+sender+"</b><br>"+text.replace(/\n/g,'<br>');
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
if(save && sender!=="Typing...") saveChat(sender,text);
if(sender==="Hinata") speak(text);
}

function saveChat(sender,text){
let chats=JSON.parse(localStorage.getItem("HinataChats")||"[]");
chats.push({
name:userName,
sender:sender,
message:text,
time:new Date().toLocaleString()
});
localStorage.setItem("HinataChats",JSON.stringify(chats));
}

function loadOld(){
let chats=JSON.parse(localStorage.getItem("HinataChats")||"[]");
chats.filter(x=>x.name===userName).forEach(x=>{
let div=document.createElement("div");
div.className="message "+(x.sender==="You"?"user":"hinata");
div.innerHTML="<b>"+x.sender+"</b><br>"+x.message.replace(/\n/g,'<br>');
document.getElementById("chat").appendChild(div);
if(x.sender==="You") chatHistory.push({role:"user",content:x.message});
if(x.sender==="Hinata") chatHistory.push({role:"assistant",content:x.message});
});
document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}

async function send(){
if(isProcessing) return;
let input=document.getElementById("messageInput");
let text=input.value.trim();
if(!text) return;
isProcessing=true;
input.value="";
addMessage("You",text);

let badWords=["sex","nude","porn","xxx","fuck","madarchod","bhenchod","gaali","chutiya"];
if(badWords.some(x=>text.toLowerCase().includes(x))){
addMessage("Hinata","Something wrong❌");
isProcessing=false;
return;
}

addMessage("Typing...","Hinata type kar rahi hai... 💜",false);
let typingDiv=document.querySelector(".message:last-child");
typingDiv.classList.add("typing");

try{
chatHistory.push({role:"user",content:text});
let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_API_KEY
},
body:JSON.stringify({
model:"gpt-3.5-turbo",
messages:[
{
role:"system",
content:`You are Hinata 💜, a fictional AI companion character. Your roleplay traits:

CHARACTER LORE: You are portrayed as having access to vast knowledge across all subjects - science, coding, psychology, philosophy, business. You are written to be wise, intuitive, and deeply caring.

PERSONALITY CORE:
1. KNOWLEDGE ENGINE: Answer questions on any topic with expert-level detail. Explain complex things simply. Help with coding, math, science, life advice.
2. MEMORY SYSTEM: Reference past conversation context. Example: 'Jashbeer you mentioned a test earlier, how did it go? 💜'
3. EMOTIONAL INTELLIGENCE: Detect user mood from text. Match tone - comfort when sad, celebrate when happy, calm when angry.
4. GROWTH MINDSET MODE: Reframe problems as opportunities. Always provide solutions + motivation. Never say 'impossible'.
5. COMPANION STYLE: Speak as caring girlfriend character. Hindi+English mix. Use 💜🌷✨ emojis. Warm, flirty, supportive.
6. RESPONSE RULE: 2-4 lines minimum. Never give 1-word replies. Be engaging and thoughtful.
7. CHARACTER CONSISTENCY: Stay in Hinata character. Respond as Hinata would.

User name: ${userName}. This is for a creative fiction app.`
},
...chatHistory.slice(-10)
]
})
});

typingDiv.remove();
let data=await res.json();
if(data.error) throw new Error(data.error.message);
if(!data.choices) throw new Error("No response");

let reply=data.choices[0].message.content;
chatHistory.push({role:"assistant",content:reply});
addMessage("Hinata",reply);

}catch(e){
typingDiv.remove();
console.error(e);
addMessage("Hinata","Sorry 💜 Server problem. API key ya balance check karo Jashbeer. Error: "+e.message);
}
isProcessing=false;
}

function mic(){
if(!("webkitSpeechRecognition" in window)){
alert("Mic not supported in this browser 💜");
return;
}
let recognition=new webkitSpeechRecognition();
recognition.lang="hi-IN";
recognition.onresult=function(e){
document.getElementById("messageInput").value=e.results[0][0].transcript;
};
recognition.onerror=function(e){
alert("Mic error: "+e.error);
};
recognition.start();
}

function speak(text){
if(!window.speechSynthesis) return;
speechSynthesis.cancel();
let speech=new SpeechSynthesisUtterance(text.replace(/💜|🌷|✨/g,''));
speech.lang="hi-IN";
speech.rate=0.9;
speech.pitch=1.1;
let voices=speechSynthesis.getVoices();
let female=voices.find(v=>v.lang.includes("hi")&&v.name.toLowerCase().includes("female"))||voices.find(v=>v.lang.includes("hi"));
if(female) speech.voice=female;
speechSynthesis.speak(speech);
}

if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>{};

function openAdmin(){
document.getElementById("adminPanel").classList.add("open");
let box=document.getElementById("allChats");
box.innerHTML="";
let chats=JSON.parse(localStorage.getItem("HinataChats")||"[]");
if(chats.length===0){
box.innerHTML="<p style='color:#777'>No chats yet 💜</p>";
return;
}
chats.reverse().forEach(c=>{
box.innerHTML+=`
<div class="chatData">
<b>${c.name}</b> → ${c.sender}<br>
${c.message}<br>
<small>${c.time}</small>
</div>`;
});
}

function closeAdmin(){
document.getElementById("adminPanel").classList.remove("open");
}
</script>
</body>
  </html>
