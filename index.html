<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinata 2.0 - CEO Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 3px solid #ff69b4;
            margin: 0 auto 15px;
            display: block;
        }
        h1 { color: #ff69b4; font-size: 2rem; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 0.9rem; }
        .chat-box { 
            background: #1a1a1a; 
            border-radius: 15px; 
            padding: 20px; 
            height: 400px; 
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        .msg { margin: 10px 0; padding: 12px; border-radius: 12px; max-width: 80%; }
        .user-msg { background: #ff69b4; margin-left: auto; color: #000; }
        .bot-msg { background: #333; }
        .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff;
        }
        button { 
            padding: 12px 20px; 
            border-radius: 25px; 
            border: none; 
            background: #ff69b4; 
            color: #000; 
            font-weight: bold;
            cursor: pointer;
        }
        #ceoPanel { 
            display: none; 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 20px;
            border: 1px solid #ff69b4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.imgur.com/8Km9tLL.png" alt="Hinata" class="logo">
            <h1>Hinata 2.0</h1>
            <p class="subtitle">Your AI Companion - CEO Edition</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg bot-msg">Hi CEO! I'm Hinata 2.0 💜 Ask me anything. I can talk in Hindi or English.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message likho...">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="ceoPanel">
            <h3 style="color: #ff69b4; margin-bottom: 10px;">👑 CEO DASHBOARD</h3>
            <p>Total Messages: <span id="msgCount">0</span></p>
            <p>Status: <span style="color: #0f0;">Premium Active - FREE FOR CEO</span></p>
            <button onclick="clearChats()" style="margin-top: 10px; background: #333; color: #fff;">Clear All Chats</button>
        </div>
    </div>

    <script>
        // 
        const GEMINI_API_KEY = AQ.Ab8RN6I83MnBBVALVxXBgL48Svcemit0onstVz7Br3_ryHe_UA
        
        // CEO KA PASSWORD - ISE CHANGE KAR DE
        const CEO_PASSWORD = "ceo123";
        
        let messageCount = 0;
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        
        // Check CEO Login
        function checkCEO() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('ceo') === CEO_PASSWORD) {
                document.getElementById('ceoPanel').style.display = 'block';
            }
        }
        checkCEO();

        // Send Message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Show user message
            chatBox.innerHTML += `<div class="msg user-msg">${message}</div>`;
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // CEO Command
            if (message === '/ceo') {
                chatBox.innerHTML += `<div class="msg bot-msg">CEO Dashboard ke liye URL me ?ceo=ceo123 add karo 💜</div>`;
                return;
            }
            
            // API Call
            if (GEMINI_API_KEY === "PASTE_YOUR_API_KEY_HERE") {
                chatBox.innerHTML += `<div class="msg bot-msg">❌ Bhai API Key daal pehle. Line 86 pe.</div>`;
                return;
            }
            
            chatBox.innerHTML += `<div class="msg bot-msg" id="thinking">Hinata is thinking... 💭</div>`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Hinata 2.0, a friendly AI girlfriend. Reply in Hinglish. User said: ${message}` }] }]
                    })
                });
                
                const data = await response.json();
                document.getElementById('thinking').remove();
                
                if (data.candidates) {
                    const reply = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
                    messageCount++;
                    document.getElementById('msgCount').textContent = messageCount;
                } else {
                    chatBox.innerHTML += `<div class="msg bot-msg">❌ API Error. Key check kar bhai.</div>`;
                }
            } catch (error) {
                document.getElementById('thinking').remove();
                chatBox.innerHTML += `<div class="msg bot-msg">❌ Network Error. Internet check kar.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function clearChats() {
            if (confirm('Sab chat delete kar du?')) {
                chatBox.innerHTML = '<div class="msg bot-msg">Chats cleared. Hi CEO! 💜</div>';
                messageCount = 0;
                document.getElementById('msgCount').textContent = 0;
            }
        }
        
        // Enter key support
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
