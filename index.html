<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinata 2.0 - CEO Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: Arial, sans-serif;
            padding: 20px;
        }
      .container { max-width: 600px; margin: 0 auto; }
      .header { text-align: center; margin-bottom: 20px; }
      .logo { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 3px solid #ff69b4;
            margin: 0 auto 15px;
            display: block;
        }
        h1 { color: #ff69b4; font-size: 2rem; margin-bottom: 5px; }
      .subtitle { color: #aaa; font-size: 0.9rem; }
      .powered-by {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            opacity: 0.7;
        }
      .powered-by img { height: 25px; }
      .chat-box { 
            background: #1a1a1a; 
            border-radius: 15px; 
            padding: 20px; 
            height: 400px; 
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
      .msg { margin: 10px 0; padding: 12px; border-radius: 12px; max-width: 80%; }
      .user-msg { background: #ff69b4; margin-left: auto; color: #000; }
      .bot-msg { background: #333; }
      .input-area { display: flex; gap: 10px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff;
        }
        button { 
            padding: 12px 20px; 
            border-radius: 25px; 
            border: none; 
            background: #ff69b4; 
            color: #000; 
            font-weight: bold;
            cursor: pointer;
        }
        #ceoPanel { 
            display: none; 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 20px;
            border: 1px solid #ff69b4;
        }
      .premium-box {
            background: #1a1a1a;
            border: 1px solid #ff69b4;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
      .premium-box input { margin: 10px 0; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="Logo.png" alt="Hinata" class="logo">
            <h1>Hinata 2.0</h1>
            <p class="subtitle">Your AI Companion - CEO Edition</p>
            <div class="powered-by">
                <span style="font-size: 0.8rem;">Powered by</span>
                <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg" alt="Gemini">
                <img src="https://www.gstatic.com/aistudio/brand/aistudio-logo.svg" alt="AI Studio">
            </div>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg bot-msg">Hi CEO! I'm Hinata 2.0 💜 Ask me anything. Type /ceo for CEO login.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message likho...">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="premium-box" id="premiumBox">
            <h3 style="color: #ff69b4;">🔓 Unlock Premium</h3>
            <p style="font-size: 0.9rem; color: #aaa; margin: 5px 0;">7 din free trial khatam. Redeem code daalo:</p>
            <input type="text" id="redeemCode" placeholder="Enter Redeem Code">
            <button onclick="checkRedeem()">Activate Premium</button>
            <p id="premiumMsg" style="font-size: 0.8rem; margin-top: 10px; color: #0f0;"></p>
        </div>

        <div id="ceoPanel">
            <h3 style="color: #ff69b4; margin-bottom: 10px;">👑 CEO DASHBOARD</h3>
            <p>Total Messages: <span id="msgCount">0</span></p>
            <p>Premium Users: <span id="premiumCount">0</span></p>
            <p>Status: <span style="color: #0f0;">CEO ACCESS - ALL FREE</span></p>
            <button onclick="clearChats()" style="margin-top: 10px; background: #333; color: #fff;">Clear All Chats</button>
        </.div>
    </div>

    <script>
        // 
        const GEMINI_API_KEY = "AQ.Ab8RN6J_3OVwbB76xTvOxoSRvty89NGuFSMV--Tl62eFPfmYhA";
        
        // CEO KA PASSWORD - "@JASHBEER04";
        const CEO_PASSWORD = "@JASHBEER04";
        
        // REDEEM CODES - 199₹ REEDEEM 
        const REDEEM_CODES = ["99", "2026", "100"];
        
        let messageCount = 0;
        let premiumUsers = 0;
        let isPremium = false;
        let isCEO = false;
        
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        
        function checkStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('ceo') === CEO_PASSWORD) {
                isCEO = true;
                isPremium = true; // CEO ke liye hamesha premium - redeem nahi chahiye
                document.getElementById('ceoPanel').style.display = 'block';
                document.getElementById('premiumBox').style.display = 'none';
            }
            if (localStorage.getItem('hinataPremium') === 'true') {
                isPremium = true;
                document.getElementById('premiumBox').style.display = 'none';
            }
        }
        checkStatus();

        function checkRedeem() {
            const code = document.getElementById('redeemCode').value.trim().toUpperCase();
            const msg = document.getElementById('premiumMsg');
            
            if (REDEEM_CODES.includes(code)) {
                isPremium = true;
                localStorage.setItem('hinataPremium', 'true');
                msg.textContent = "✅ Premium Activated! Refresh karo.";
                msg.style.color = "#0f0";
                setTimeout(() => location.reload(), 1500);
            } else {
                msg.textContent = "❌ Invalid Code. CEO se contact karo.";
                msg.style.color = "#f00";
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            if (message === '/ceo') {
                chatBox.innerHTML += `<div class="msg bot-msg">CEO Dashboard: URL me?ceo=${CEO_PASSWORD} add karo 💜</div>`;
                userInput.value = '';
                return;
            }
            
            if (!isPremium &&!isCEO && messageCount >= 10) {
                chatBox.innerHTML += `<div class="msg bot-msg">❌ Free trial khatam. Neeche redeem code daalo ya CEO bano 😏</div>`;
                userInput.value = '';
                return;
            }
            
            chatBox.innerHTML += `<div class="msg user-msg">${message}</div>`;
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if (GEMINI_API_KEY.includes("PASTE_YOUR_API_KEY")) {
                chatBox.innerHTML += `<div class="msg bot-msg">❌ Bhai API Key daal pehle Line 108 pe.</div>`;
                return;
            }
            
            chatBox.innerHTML += `<div class="msg bot-msg" id="thinking">Hinata is thinking... 💭</div>`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are Hinata 2.0, a friendly AI girlfriend. Reply in Hinglish. User said: ${message}` }] }]
                    })
                });
                
                const data = await response.json();
                document.getElementById('thinking').remove();
                
                if (data.candidates) {
                    const reply = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="msg bot-msg">${reply}</div>`;
                    messageCount++;
                    document.getElementById('msgCount').textContent = messageCount;
                } else {
                    chatBox.innerHTML += `<div class="msg bot-msg">❌ API Error. Key check kar.</div>`;
                }
            } catch (error) {
                document.getElementById('thinking').remove();
                chatBox.innerHTML += `<div class="msg bot-msg">❌ Network Error.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function clearChats() {
            if (confirm('Sab chat delete kar du CEO?')) {
                chatBox.innerHTML = '<div class="msg bot-msg">Chats cleared. Hi CEO! 💜</div>';
                messageCount = 0;
                document.getElementById('msgCount').textContent = 0;
            }
        }
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
  </html>
