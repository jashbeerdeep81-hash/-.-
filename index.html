body{

height:100vh;

button{
background:#a855f7;
border:none;
color:white;

/* LOGIN */

#loginPage{

.loginBox{

.logo{
width:100px;
height:100px;
object-fit:contain;
}

h1{
color:#a855f7;
}


/* APP */

#app{
height:100vh;
display:flex;
flex-direction:column;
}


header{
height:65px;
background:#11111b;
display:flex;
align-items:center;
padding:10px 15px;
gap:12px;
border-bottom:1px solid #222;
}

header img{
width:45px;
height:45px;
}

header span{
font-size:20px;
font-weight:bold;
color:#a855f7;
}

#adminBtn{
margin-left:auto;
display:none;
}


/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
max-width:85%;
padding:13px;
margin:10px 0;
border-radius:18px;
line-height:1.5;
}

.user{
background:#a855f7;
margin-left:auto;
}

.hinata{
background:#1d1d2a;
}


footer{
display:flex;
padding:10px;
gap:8px;
background:#11111b;
}

footer input{
margin:0;

.mic{
width:50px;
}


/* ADMIN */

#adminPanel{
position:fixed;
right:-100%;
top:0;
height:100%;
width:85%;
max-width:400px;
background:#11111b;
z-index:20;
padding:20px;
overflow:auto;
transition:.3s;
}

#adminPanel.open{
right:0;
}

.chatData{
background:#1b1b28;
padding:10px;
border-radius:12px;
margin:10px 0;

<script>

function addMessage(sender,text){

let div=document.createElement("div");

function saveChat(sender,text){

let chats=
JSON.parse(localStorage.getItem("HinataChats")||"[]");


chats.push({

name:userName,

sender:sender,

message:text,

time:new Date().toLocaleString()

});


localStorage.setItem(
"HinataChats",
JSON.stringify(chats)

function loadOld(){

.forEach(x=>{

function mic(){

if(!("webkitSpeechRecognition" in window)){

alert("Mic  supported");

return;

}


let recognition=
new webkitSpeechRecognition();


recognition.lang="hi-IN";


recognition.onresult=function(e){

document.getElementById("messageInput").value=
e.results[0][0].transcript;

};


recognition.start();

}





function speak(text){

let speech=
new SpeechSynthesisUtterance(text);


speech.lang="hi-IN";

speech.rate=0.9;


let voices=
speechSynthesis.getVoices();


let female=
voices.find(v=>
v.name.toLowerCase().includes("female")
);


if(female)
speech.voice=female;


speechSynthesis.speak(speech);

}





function openAdmin(){

document.getElementById("adminPanel")
.classList.add("open");


let box=document.getElementById("allChats");

box.innerHTML="";


let chats=
JSON.parse(localStorage.getItem("HinataChats")||"[]");


chats.forEach(c=>{

box.innerHTML+=`

<div class="chatData">

<b>${c.name}</b><br>

${c.sender}: ${c.message}

<br>

<small>${c.time}</small>

</div>

`;

});


}





function closeAdmin(){

document.getElementById("adminPanel")
.classList.remove("open");

}
