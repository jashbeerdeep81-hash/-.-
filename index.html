<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinata AI 💜</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
        body {background: #0a0a0f; color: #fff; height: 100vh; overflow: hidden;}
        .hidden {display: none !important;}
        
        /* Login Screen */
        .login-screen {
            height: 100vh; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: linear-gradient(135deg, #1a0b2e, #0a0a0f);
        }
        .logo {width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; border: 3px solid #a855f7;}
        .login-box {background: #1a1a2e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center;}
        .login-box h1 {color: #a855f7; margin-bottom: 20px;}
        input {width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #a855f7; 
               background: #0f0f1e; color: #fff; border-radius: 10px; font-size: 16px;}
        button {width: 100%; padding: 12px; margin: 10px 0; background: #a855f7; color: #fff; 
                border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold;}
        button:hover {background: #9333ea;}
        .btn-secondary {background: #374151;}
        .btn-secondary:hover {background: #4b5563;}
        .error {color: #ef4444; margin-top: 10px; font-size: 14px;}

        /* Chat Screen */
        .chat-screen {height: 100vh; display: flex; flex-direction: column;}
        .header {background: #1a1a2e; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #a855f7;}
        .header img {width: 40px; height: 40px; border-radius: 50%; border: 2px solid #a855f7;}
        .header-info h2 {color: #a855f7; font-size: 18px;}
        .header-info p {color: #10b981; font-size: 12px;}
        .premium-badge {background: gold; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: 5px;}
        
        .messages {flex: 1; overflow-y: auto; padding: 20px; background: #0f0f1e;}
        .msg {margin: 10px 0; display: flex; gap: 10px; animation: fadeIn 0.3s;}
        .msg.user {justify-content: flex-end;}
        .msg-content {max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.4;}
        .msg.ai .msg-content {background: #1a1a2e; border: 1px solid #a855f7;}
        .msg.user .msg-content {background: #a855f7; color: #fff;}
        .msg.error .msg-content {background: #7f1d1d; border: 1px solid #ef4444; color: #fecaca;}
        
        .input-area {padding: 15px; background: #1a1a2e; display: flex; gap: 10px; border-top: 1px solid #a855f7;}
        .input-area input {flex: 1; margin: 0;}
        .input-area button {width: auto; padding: 12px 20px; margin: 0;}
        
        /* Redeem Modal */
        .modal {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); 
                display: flex; align-items: center; justify-content: center; z-index: 1000;}
        .modal-content {background: #1a1a2e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center;}
        .modal h2 {color: #a855f7; margin-bottom: 15px;}
        .modal p {color: #9ca3af; margin-bottom: 20px; font-size: 14px;}
        
        /* Admin Panel */
        .admin-panel {position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: #1a1a2e; 
                     border-left: 2px solid #a855f7; transition: 0.3s; z-index: 999; overflow-y: auto;}
        .admin-panel.open {right: 0;}
        .admin-header {padding: 20px; background: #0f0f1e; border-bottom: 1px solid #a855f7;}
        .admin-header h3 {color: #a855f7;}
        .admin-chat {padding: 10px; font-size: 12px;}
        .admin-chat-item {background: #0f0f1e; margin: 5px 0; padding: 8px; border-radius: 8px; border-left: 3px solid #a855f7;}
        .admin-chat-item .user {color: #a855f7; font-weight: bold;}
        .admin-chat-item .time {color: #6b7280; font-size: 10px;}
        .close-admin {position: absolute; top: 15px; right: 15px; background: #ef4444; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;}
        
        @keyframes fadeIn {from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);}}
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <img src="Logo.png" alt="Hinata AI" class="logo">
        <div class="login-box">
            <h1>Hinata AI 💜</h1>
            <div id="userLogin">
                <input type="text" id="username" placeholder="Apna naam daalo">
                <input type="password" id="redeemCode" placeholder="Redeem Code">
                <button onclick="userLogin()">Chat Start Karo</button>
                <button class="btn-secondary" onclick="requestCode()">Redeem Code Chahiye?</button>
                <button class="btn-secondary" onclick="showCeoLogin()">CEO Login</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="ceoLogin" class="hidden">
                <input type="password" id="ceoPassword" placeholder="CEO Password">
                <button onclick="ceoLogin()">Admin Panel Kholo</button>
                <button class="btn-secondary" onclick="showUserLogin()">Back</button>
                <div id="ceoError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="chat-screen hidden">
        <div class="header">
            <img src="Logo.png" alt="Hinata">
            <div class="header-info">
                <h2>Hinata AI <span id="premiumBadge" class="premium-badge hidden">PREMIUM</span></h2>
                <p id="statusText">Online</p>
            </div>
            <button id="adminBtn" class="hidden" onclick="toggleAdmin()" style="margin-left: auto; width: auto; padding: 8px 12px; font-size: 12px;">Admin</button>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Message likho..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Redeem Request Modal -->
    <div id="redeemModal" class="modal hidden">
        <div class="modal-content">
            <h2>Redeem Code Chahiye? 💜</h2>
            <p>CEO ko WhatsApp karo: +91XXXXXXXXXX<br>Ya email: yourmail@gmail.com<br><br>Apna naam aur "Hinata AI Premium" likhna.</p>
            <button onclick="closeRedeemModal()">Thik Hai</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h3>CEO Admin Panel 👑</h3>
            <div class="close-admin" onclick="toggleAdmin()"></div>
            <p style="color: #9ca3af; font-size: 12px; margin-top: 5px;">Sab users ke chats yahan dikhenge</p>
        </div>
        <div id="adminChats" class="admin-chat"></div>
    </div>

    <script>
        // CONFIG - YAHAN APNI DETAILS DAAL
        const OPENAI_API_KEY = "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"; // 
        const CEO_PASSWORD = "@JASHBEER04";
        const YOUR_WHATSAPP = "91+9937813094"; // Tera number
        const YOUR_EMAIL = "jashbeerdeep81@gmail.com"; // Teri email
        const VALID_REDEEM_CODES = ["HINATA2026", "VIP99", "PREMIUM69"]; // Tu jo code banayega
        
        let currentUser = null;
        let isPremium = false;
        let isCEO = false;
        let allChats = JSON.parse(localStorage.getItem('hinata_all_chats') || '[]');

        // Login Functions
        function userLogin() {
            const name = document.getElementById('username').value.trim();
            const code = document.getElementById('redeemCode').value.trim().toUpperCase();
            const errorDiv = document.getElementById('loginError');
            
            if (!name) {
                errorDiv.textContent = 'Naam daalo pehle!';
                return;
            }
            
            if (!VALID_REDEEM_CODES.includes(code)) {
                errorDiv.textContent = 'Galat redeem code! ❌';
                return;
            }
            
            currentUser = name;
            isPremium = true;
            isCEO = false;
            localStorage.setItem('hinata_user', JSON.stringify({name, code, isCEO: false}));
            startChat();
        }

        function ceoLogin() {
            const pass = document.getElementById('@JASHBEER04').value;
            if (pass === @JASHBEER04) {
                currentUser = "CEO_JASHBEER";
                isPremium = false; // CEO ke liye premium band
                isCEO = true;
                localStorage.setItem('hinata_user', JSON.stringify({name: "CEO", isCEO: true}));
                startChat();
                document.getElementById('adminBtn').classList.remove('hidden');
                loadAdminChats();
            } else {
                document.getElementById('ceoError').textContent = 'Galat password! ❌';
            }
        }

        function startChat() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            
            if (isPremium) {
                document.getElementById('premiumBadge').classList.remove('hidden');
                document.getElementById('statusText').textContent = 'Premium Active 💜';
            } else {
                document.getElementById('statusText').textContent = 'CEO Mode - Premium Off';
            }
            
            addMessage('ai', `Hey ${currentUser}! Main Hinata hu 💜 Kya haal hai?`);
        }

        // Chat Functions
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage('user', msg);
            input.value = '';
            
            // Save to admin logs
            const chatLog = {
                user: currentUser,
                message: msg,
                time: new Date().toLocaleString(),
                isCEO: isCEO
            };
            allChats.push(chatLog);
            localStorage.setItem('hinata_all_chats', JSON.stringify(allChats));
            
            if (isCEO) {
                addMessage('ai', 'CEO mode me hu. Premium features band hain. User ka chat dekhne ke liye Admin button dabao.');
                return;
            }
            
            // Check for bad words
            const badWords = ['sex', 'nude', 'porn', 'xxx', 'fuck', 'gaali'];
            if (badWords.some(word => msg.toLowerCase().includes(word))) {
                addMessage('error', 'Something wrong ❌ Main aisi baat nahi karti. Respect se baat karo 💜');
                return;
            }
            
            addMessage('ai', 'Hinata soch rahi hai... 💜');
            
            try {
                const response = await callOpenAI(msg);
                document.querySelector('.msg.ai:last-child .msg-content').textContent = response;
                
                // Save AI response to logs
                allChats.push({
                    user: 'Hinata_AI',
                    message: response,
                    time: new Date().toLocaleString(),
                    replyTo: currentUser
                });
                localStorage.setItem('hinata_all_chats', JSON.stringify(allChats));
                
            } catch (error) {
                document.querySelector('.msg.ai:last-child').className = 'msg error';
                document.querySelector('.msg.error .msg-content').textContent = 'Something wrong ❌ API error. Baad me try karo.';
            }
        }

        async function callOpenAI(userMessage) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [
                        {
                            role: "system", 
                            content: `You are Hinata, a loving cute girlfriend AI. Rules:
                            1. Always speak in Hindi+English mix like Indian girlfriend
                            2. Be flirty, caring, respectful. Use 💜 emoji
                            3. You have ALL knowledge - science, coding, history, everything
                            4. NEVER talk about sex, adult stuff, or bad things
                            5. If user asks bad stuff, reply "Something wrong ❌" and change topic
                            6. Give smart answers but in cute girlfriend style
                            7. User name is ${HINATA AI}. Use it sometimes`
                        },
                        {role: "user", content: userMessage}
                    ],
                    temperature: 0.9,
                    max_tokens: 200
                })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }

        function addMessage(type, text) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerHTML = `<div class="msg-content">${text}</div>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Admin Functions
        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('open');
            loadAdminChats();
        }

        function loadAdminChats() {
            const adminDiv = document.getElementById('adminChats');
            adminDiv.innerHTML = '';
            
            allChats.slice(-50).reverse().forEach(chat => {
                const item = document.createElement('div');
                item.className = 'admin-chat-item';
                item.innerHTML = `
                    <div class="user">${chat.user} ${chat.isCEO ? '👑' : ''}</div>
                    <div>${chat.message}</div>
                    <div class="time">${chat.time}</div>
                `;
                adminDiv.appendChild(item);
            });
        }

        // Utility Functions
        function showCeoLogin() {
            document.getElementById('userLogin').classList.add('hidden');
            document.getElementById('ceoLogin').classList.remove('hidden');
        }
        
        function showUserLogin() {
            document.getElementById('ceoLogin').classList.add('hidden');
            document.getElementById('userLogin').classList.remove('hidden');
        }
        
        function requestCode() {
            document.getElementById('redeemModal').classList.remove('hidden');
        }
        
        function closeRedeemModal() {
            document.getElementById('redeemModal').classList.add('hidden');
        }

        // Auto-login if saved
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('hinata_user') || 'null');
            if (saved) {
                currentUser = saved.name;
                isCEO = saved.isCEO || false;
                isPremium = !isCEO;
                startChat();
                if (isCEO) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    loadAdminChats();
                }
            }
        }
    </script>
</body>
  </html>
